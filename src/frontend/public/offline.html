<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - School Mitra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 50%, #f3e8ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }
        
        .icon {
            width: 48px;
            height: 48px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        p {
            font-size: 16px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            border: none;
            cursor: pointer;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .status {
            margin-top: 24px;
            padding: 12px;
            background: #fef3c7;
            border-radius: 8px;
            font-size: 14px;
            color: #92400e;
            display: none;
        }
        
        .status.online {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1e293b 0%, #312e81 50%, #581c87 100%);
            }
            
            .container {
                background: rgba(30, 41, 59, 0.95);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            h1 {
                color: #f1f5f9;
            }
            
            .subtitle, p {
                color: #cbd5e1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
                <line x1="1" y1="12" x2="23" y2="12" stroke-dasharray="2,2"></line>
            </svg>
        </div>
        
        <h1>You're Offline</h1>
        <p class="subtitle">School Mitra</p>
        
        <p>
            It looks like you've lost your internet connection. Please check your network settings and try again.
        </p>
        
        <button class="button" onclick="retryConnection()">
            Retry Connection
        </button>
        
        <div id="status" class="status"></div>
    </div>
    
    <script>
        function retryConnection() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Checking connection...';
            statusEl.style.display = 'block';
            statusEl.className = 'status';
            
            // Try to reload the page
            window.location.reload();
        }
        
        // Automatically check for connection and reload when online
        function checkConnection() {
            if (navigator.onLine) {
                const statusEl = document.getElementById('status');
                statusEl.textContent = 'Connection restored! Reloading...';
                statusEl.className = 'status online';
                
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            }
        }
        
        // Check connection every 3 seconds
        setInterval(checkConnection, 3000);
        
        // Listen for online event
        window.addEventListener('online', () => {
            checkConnection();
        });
    </script>
</body>
</html>
